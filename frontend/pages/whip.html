<div class="space-y-6">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Local Preview -->
        <div class="bg-white/5 rounded-xl p-6 shadow-lg border border-white/10">
            <h3 class="text-lg font-semibold text-white mb-4">Local Preview</h3>
            <div class="bg-black rounded-lg overflow-hidden h-96">
                <video id="localVideo" autoplay muted class="w-full h-full object-contain"></video>
            </div>
        </div>

        <!-- Push Settings -->
        <div class="bg-white/5 rounded-xl p-6 shadow-lg border border-white/10">
            <h3 class="text-lg font-semibold text-white mb-4">Push Settings</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-white font-semibold mb-2">App Name</label>
                    <input type="text" id="appName" value="live" class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                <div>
                    <label class="block text-white font-semibold mb-2">Stream Name</label>
                    <input type="text" id="streamName" value="test" class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                <div>
                    <label class="block text-white font-semibold mb-2">Push URL</label>
                    <input type="text" id="whipUrl" readonly class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                <div>
                    <label class="block text-white font-semibold mb-2">Video Device</label>
                    <select id="videoDevice" class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-primary">
                        <option value="">Authorize after starting push</option>
                    </select>
                </div>
                <div>
                    <label class="block text-white font-semibold mb-2">Audio Device</label>
                    <select id="audioDevice" class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-primary">
                        <option value="">Authorize after starting push</option>
                    </select>
                </div>
                <div class="flex space-x-4">
                    <button id="startStream" class="flex-1 bg-gradient-primary text-white px-6 py-3 rounded-lg font-semibold hover:shadow-neon transition-all duration-300 hover:-translate-y-1">
                        <i class="fa fa-play mr-2"></i>Start Push
                    </button>
                    <button id="stopStream" disabled class="flex-1 bg-gradient-secondary text-white px-6 py-3 rounded-lg font-semibold hover:shadow-neon transition-all duration-300 hover:-translate-y-1">
                        <i class="fa fa-stop mr-2"></i>Stop Push
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
